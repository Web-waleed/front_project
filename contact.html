<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" 
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="contact.CSS">
</head>
<body>
    

    <!-- Navigation Bar -->
    <header>
        <div class="logo"><a href="./contact.html"><img src="./logo/Tofan Market Part of.png" alt=""></a></div>
        <ul>
            <li class="il"><a href="./contact.html"><img src="./logo/house-building.png" alt="">Home</a></li>
            <li class="il"><a href="#about"><img src="./logo/to-do-list.png" alt="">To-Do List</a></li>
            <li class="il"><a href="#contact"><img src="./logo/Scientific Calculator.png" alt="">Calculator</a></li>
            <li class="il"><a href="#contact"><img src="./logo/calculator.png" alt="">Simple Calculator</a></li>
            <li class="il"><a id="toggleButton"><img src="./logo/color-circle.png" alt="">Colors</a></li> 

            <li>

            <select >
                <option disabled selected>Choose the font family</option>
                <option value="'Arial', sans-serif">Arial</option>
                <option value="'Courier New', monospace">Courier New</option>
                <option value="'Georgia', serif">Georgia</option>
                <option value="'Times New Roman', serif">Times New Roman</option>
                <option value="'Verdana', sans-serif">Verdana</option>
            </select> 
        </li>
        </ul>
        
    </header>

    <div id="colorPalette">
        <div class="color-circle" style="background-color: #5A2D82;"></div>
        <div class="color-circle" style="background-color: #EB6100;"></div>
        <div class="color-circle" style="background-color: #000000;"></div>
        <div class="color-circle" style="background-color: #0033A0;"></div>
        <div class="color-circle" style="background-color: #A70E54;"></div>
        <div class="color-circle" style="background-color: #FFCB05;"></div>
        <div class="color-circle" style="background-color: #009639;"></div>
        <div class="color-circle" style="background-color: #00B5E2;"></div>
        <div class="color-circle" style="background-color: #ED2939;"></div>
        <div class="color-circle" style="background-color: #FFC0CB;"></div>
        <div class="color-circle" style="background-color: #9ACD32;"></div>
        <div class="color-circle" style="background-color: #FFFFFF;"></div>
    </div>

    <!-- Home Page Contact Form -->
    <section id="home">
        
        <form id="contact-form">
            <h1 >Contact Us</h1>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" placeholder="Enter yor Username" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Email@" required><br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required><br><br>

            <label for="phone">Phone Number:</label>
            <input type="text" id="phone" name="phone" placeholder="Enter your phone number" required>
<br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Password" required><br><br>
<div class="check">
            <input type="checkbox" id="agreement"><p>I agree to the terms and conditions </p>  <br><br>
        </div>
            <button type="button" id="inLocal" >Save to Local Storage</button>
            <button type="button" id="inSession" >Save to Session Storage</button>
            <button class="reset1" type="reset">Clear Form</button>
        </form>
    </section>
    

    <!-- Footer -->
    <footer>
        
        
        <p>&copy; 2024 Tufan Market. All rights reserved.</p>
    </footer>

    <script src="contact.JS"></script>
</body>
</html>
